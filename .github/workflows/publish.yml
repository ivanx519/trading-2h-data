name: Aggiorna dati dashboard

# Scarica dashboard_data.json dal VPS (dove il bot lo rigenera ogni ~5 min)
# e lo committa qui. La dashboard legge questo file via raw.githubusercontent.
# Autenticazione al VPS via password (secret VPS_PASSWORD). Solo scp in lettura.

on:
  schedule:
    - cron: '13,43 * * * *'   # ogni 30 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installa sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Scarica dal VPS e committa
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no \
            root@217.160.9.142:/opt/trading-2h/dashboard_data.json ./dashboard_data.json
          test -s dashboard_data.json
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard_data.json
          git commit -m "dati $(date -u +%FT%TZ)" || { echo "nessuna modifica"; exit 0; }
          git push
